name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.3.0"
        required: true
      ref:
        description: "Git ref to release"
        required: true
        default: "main"
      update_homebrew:
        description: "Create a Homebrew tap update PR"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-slim
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Validate manual release version
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${RELEASE_VERSION}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "version must look like vX.Y.Z: ${RELEASE_VERSION}" >&2; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse "${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "tag already exists locally: ${RELEASE_VERSION}" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "tag already exists on origin: ${RELEASE_VERSION}" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_VERSION}" -m "${RELEASE_VERSION}"
          git push origin "${RELEASE_VERSION}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        run: make release VERSION=${RELEASE_VERSION}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: |
            dist/baseline-darwin-amd64
            dist/baseline-darwin-arm64
            dist/baseline-linux-amd64
            dist/baseline-linux-arm64
            dist/baseline-windows-amd64.exe
            dist/checksums.txt

      - name: Checkout Homebrew tap
        if: github.event_name == 'workflow_dispatch' && inputs.update_homebrew
        uses: actions/checkout@v4
        with:
          repository: urugus/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.RELEASE_PAT }}

      - name: Update Homebrew formula
        if: github.event_name == 'workflow_dispatch' && inputs.update_homebrew
        run: |
          ruby .github/scripts/update-homebrew-formula.rb \
            homebrew-tap/Formula/baseline.rb \
            "${RELEASE_VERSION}" \
            dist/checksums.txt

      - name: Create Homebrew tap PR
        if: github.event_name == 'workflow_dispatch' && inputs.update_homebrew
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          branch="baseline-${RELEASE_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add Formula/baseline.rb
          git commit -m "Update baseline to ${RELEASE_VERSION}"
          git push origin "${branch}"
          gh pr create \
            --repo urugus/homebrew-tap \
            --base main \
            --head "${branch}" \
            --title "Update baseline to ${RELEASE_VERSION}" \
            --body "Updates baseline formula to ${RELEASE_VERSION}."
