name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.3.0"
        required: true
      ref:
        description: "Git ref to release"
        required: true
        default: "main"
      update_homebrew:
        description: "Create a Homebrew tap update PR"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    if: >
      github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/prepare-'))
    runs-on: ubuntu-slim
    steps:
      - name: Determine release version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          case "${EVENT_NAME}" in
            workflow_dispatch) version="${INPUT_VERSION}" ;;
            push)              version="${REF_NAME}" ;;
            pull_request)      version="v${PR_HEAD_REF#release/prepare-}" ;;
            *) echo "unsupported event: ${EVENT_NAME}" >&2; exit 1 ;;
          esac
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must look like vX.Y.Z: ${version}" >&2
            exit 1
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'workflow_dispatch' && inputs.ref) || (github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha) || github.ref }}

      - name: Create local tag
        if: github.event_name != 'push'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          head_commit="$(git rev-parse HEAD)"
          if git rev-parse --verify "${RELEASE_VERSION}^{commit}" >/dev/null 2>&1; then
            existing_commit="$(git rev-parse --verify "${RELEASE_VERSION}^{commit}")"
            if [ "${existing_commit}" != "${head_commit}" ]; then
              echo "tag ${RELEASE_VERSION} exists at ${existing_commit}, but HEAD is ${head_commit}" >&2
              echo "Delete the tag manually if you intend to re-tag." >&2
              exit 1
            fi
            echo "tag ${RELEASE_VERSION} already exists at HEAD, reusing"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_VERSION}" -m "${RELEASE_VERSION}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: make release VERSION=${RELEASE_VERSION}

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          notes="$(awk -v ver="${RELEASE_VERSION}" '
            $0 ~ "^## "ver"([[:space:]]|$)" { in_section=1; next }
            /^## v/ && in_section { exit }
            in_section { print }
          ' CHANGELOG.md)"
          if [ -z "${notes//[[:space:]]/}" ]; then
            notes="Release ${RELEASE_VERSION}."
          fi
          {
            echo "body<<RELEASE_NOTES_EOF"
            printf '%s\n' "${notes}"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/baseline-darwin-amd64
            dist/baseline-darwin-arm64
            dist/baseline-linux-amd64
            dist/baseline-linux-arm64
            dist/baseline-windows-amd64.exe
            dist/checksums.txt

      - name: Checkout Homebrew tap
        if: (github.event_name == 'workflow_dispatch' && inputs.update_homebrew) || github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: urugus/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Ruby
        if: (github.event_name == 'workflow_dispatch' && inputs.update_homebrew) || github.event_name == 'pull_request'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Update Homebrew formula
        if: (github.event_name == 'workflow_dispatch' && inputs.update_homebrew) || github.event_name == 'pull_request'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          ruby .github/scripts/update-homebrew-formula.rb \
            homebrew-tap/Formula/baseline.rb \
            "${RELEASE_VERSION}" \
            dist/checksums.txt

      - name: Create Homebrew tap PR
        if: (github.event_name == 'workflow_dispatch' && inputs.update_homebrew) || github.event_name == 'pull_request'
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          branch="baseline-${RELEASE_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add Formula/baseline.rb
          git commit -m "Update baseline to ${RELEASE_VERSION}"
          git push origin "${branch}"
          gh pr create \
            --repo urugus/homebrew-tap \
            --base main \
            --head "${branch}" \
            --title "Update baseline to ${RELEASE_VERSION}" \
            --body "Updates baseline formula to ${RELEASE_VERSION}."
