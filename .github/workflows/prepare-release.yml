name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Proposed release version, e.g. v0.3.0"
        required: true
      previous_tag:
        description: "Previous release tag. Leave empty to use the latest v* tag."
        required: false
        default: ""
      base_ref:
        description: "Base branch or ref"
        required: true
        default: "main"

permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: read

jobs:
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.base_ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prepare release PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.RELEASE_PAT || github.token }}
          prompt: '/prepare-release ${{ inputs.version }} "${{ inputs.previous_tag }}" ${{ inputs.base_ref }}'
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "Bash,Read,Write,Edit,MultiEdit,Glob,Grep"
